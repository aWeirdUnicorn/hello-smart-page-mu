<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Page</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="page-centered">

    <div class="card card--glass animate-in" style="max-width: 540px; width: 100%; text-align: center; padding: 3rem 4rem;">
        <img src="https://lh3.googleusercontent.com/d/1bO-O01JX1Aa1gf9grucISEHmKa3mxyyI" alt="Khadeejah" style="width: 90px; height: 90px; border-radius: 50%; object-fit: cover; border: 3px solid var(--color-primary); box-shadow: 3px 3px 0px var(--color-primary); margin-bottom: 1rem;">
        <span class="label-stamp">Welcome</span>
        <h1 class="display-title" style="margin-top: 1rem;">Hello, I Am So Smart!</h1>
        <span class="divider divider--yellow" style="width: 60%; margin: 1.5rem auto; display: block;"></span>
        <button class="btn-primary" onclick="showMessage()">Tell Me Again</button>
        <div id="message" class="body-copy" style="margin-top: 1.5rem; min-height: 2rem; color: var(--color-primary);"></div>

        <span class="divider divider--yellow" style="width: 60%; margin: 2rem auto 1.5rem; display: block;"></span>
        <p class="body-copy" style="margin-bottom: 1rem;">What's your favorite dessert?</p>
        <div style="display: flex; gap: 0.5rem;">
            <input 
                type="text" 
                id="dessertInput" 
                placeholder="Enter your favorite dessert" 
                style="flex: 1; padding: 0.75rem; border: 2px solid var(--color-primary); border-radius: var(--radius-input); font-family: var(--font-body); font-size: 1rem;"
            >
            <button class="btn-primary" onclick="validateDessert()" style="white-space: nowrap;">Submit</button>
        </div>
        <div id="dessertMessage" class="body-copy" style="margin-top: 1rem; min-height: 1.5rem;"></div>
    </div>

    <script>
function showMessage() {
            document.getElementById('message').textContent = 'Oh you are so so smart!';
        }

        async function validateDessert() {
            const input = document.getElementById('dessertInput').value.trim();
            const messageDiv = document.getElementById('dessertMessage');

            const res = await fetch('/api/dessert', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ dessert: input })
            });

            const data = await res.json();
            messageDiv.textContent = data.message;
            messageDiv.style.color = data.result === 'success' ? 'var(--color-primary)' : 'var(--color-primary-dark)';
        }

        // Allow Enter key to submit
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('dessertInput').addEventListener('keypress', function(event) {
                if (event.key === 'Enter') {
                    validateDessert();
                }
            });
        });
    </script>

</body>
</html>
